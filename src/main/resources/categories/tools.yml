# Item identifier.
# Supports vanilla Minecraft materials and custom items.
#
# Formats:
# - <material>               (Vanilla Minecraft)
# - nexo:<id>                (Nexo)
# - ia:<id>                  (ItemsAdder)
# - mmoitems:<category>:<id> (MMOItems)
# - oraxen:<id>              (Oraxen)
# - ce:<id>                  (CraftEngine)
# - mm:<id>                  (MythicMobs)
#
# Examples:
# - STONE
# - DIAMOND_SWORD
# - nexo:ruby
# - ia:magic_ingot
# - mmoitems:SWORD:LONG_SWORD
# - oraxen:amethyst_hammer
# - ce:topaz
# - mm:BanditTunic
